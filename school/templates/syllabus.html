{% extends "base.html" %}
{% load static %}

{% block content %}
<div class="row">
    <div class="col-md-12">
        <h3 style="background-color: #203C5C; color:white; padding:10px;">Syllabus</h3>
        
        <div class="mb-3">
            <form method="get" class="form-inline">
                <select name="class" class="form-control mr-2">
                    <option value="">All Classes</option>
                    {% for class_val, class_name in class_choices %}
                        <option value="{{ class_val }}" {% if selected_class == class_val %}selected{% endif %}>
                            {{ class_name }}
                        </option>
                    {% endfor %}
                </select>
                <button type="submit" class="btn btn-primary">Filter</button>
            </form>
        </div>
<br>
        <div class="row">
            {% for syllabus in syllabuses %}
            <div class="col-md-4 text-center mb-3">
                {% if syllabus.image %}
                    <img src="{{ syllabus.image.url }}" alt="Syllabus" 
                         style="width: 100%; height: 200px; object-fit: cover; border-radius: 5px;">
                {% else %}
                    <p>No Image</p>
                {% endif %}
                <p class="mt-1"><strong>{{ syllabus.get_class_name_display }}</strong></p>
            </div>
            {% empty %}
                <div class="col-md-12 text-center text-muted">No syllabus found.</div>
            {% endfor %}
        </div>
    </div>
</div>
{% endblock %}
