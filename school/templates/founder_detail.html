{% extends "base.html" %}

{% block title %}{{ founder.name }} - Founder{% endblock %}
{% load static %}
{% block content %}

<div class="col-md-12" style="background: whitesmoke; margin-bottom: 15px; padding: 15px;">
    <h4 style="font-size: 18px; font-weight: bold; background: #1d1836; padding: 5px; color: #fff;">
        {{ founder.name }}
    </h4>
    <div class="row">
        <div class="col-md-4 text-center">
            {% if founder.photo %}
            <img src="{{ founder.photo.url }}" class="img-responsive img-thumbnail" alt="{{ founder.name }}">
            {% else %}
            <img src="{% static 'img/default_founder.png' %}" class="img-responsive img-thumbnail" alt="{{ founder.name }}">
            {% endif %}
        </div>
        <div class="col-md-8">
            <p style="text-align: justify; line-height: 25px;">
                {{ founder.description|linebreaks }}
            </p>
        </div>
    </div>
</div>

{% endblock content %}
